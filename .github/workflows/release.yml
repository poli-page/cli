name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi
          echo "Releasing @poli-page/cli@$PKG_VERSION"

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      # Trusted Publishing (OIDC) requires npm ≥ 11.5.1 — Node 22 ships
      # with npm 10.x. `npm install -g npm@latest` (with or without
      # `--force`) breaks the in-place install with `Cannot find module
      # 'promise-retry'` (npm cannot replace itself cleanly). Workaround:
      # use `npx` to fetch a recent npm into a temp cache and run the
      # publish command from there — the bundled npm stays untouched.
      #
      # No NODE_AUTH_TOKEN is needed: the `id-token: write` permission
      # above lets npm exchange the GitHub-issued JWT for a publish
      # session, scoped to this repo + workflow per the package's
      # "Trusted Publisher" settings.
      - name: Publish to npm (Trusted Publishing / OIDC)
        run: npx --yes npm@latest publish --access public
